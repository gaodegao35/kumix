<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YUHZ CAFE&CALL — Sales Tracker</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; color: #111; min-height: 100vh; padding: 32px 24px; }
    a { color: inherit; text-decoration: none; }
    h1 { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
    .subtitle { font-size: 13px; color: #888; margin-bottom: 24px; }
    .warning { background: #fffbeb; border: 1px solid #fde68a; border-radius: 8px; padding: 10px 14px; font-size: 12px; color: #92400e; margin-bottom: 20px; display: flex; gap: 8px; align-items: flex-start; line-height: 1.5; }
    .status-bar { display: flex; align-items: center; gap: 8px; font-size: 13px; color: #888; margin-bottom: 20px; }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: #ccc; }
    .dot.active { background: #16a34a; }
    .dot.error  { background: #dc2626; }
    .next-refresh { font-size: 12px; color: #aaa; margin-left: auto; }
    .section-label { font-size: 11px; font-weight: 700; color: #aaa; text-transform: uppercase; letter-spacing: 0.1em; margin: 20px 0 10px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; }
    .card { background: #fff; border: 1px solid #e0e0e0; border-radius: 10px; padding: 18px 20px; display: block; transition: border-color 0.2s, box-shadow 0.2s; }
    .card:hover { border-color: #aaa; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
    .card.changed { border-color: #16a34a; }
    .member-name { font-size: 11px; font-weight: 700; color: #888; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
    .arrow { font-size: 14px; color: #ccc; }
    .sales-row { display: flex; align-items: baseline; gap: 8px; }
    .sales-count { font-size: 32px; font-weight: 800; color: #111; line-height: 1; }
    .sales-label { font-size: 12px; color: #aaa; }
    .stock-sub { font-size: 11px; color: #bbb; margin-top: 5px; }
    .delta-badge { display: inline-block; font-size: 12px; font-weight: 700; border-radius: 5px; padding: 1px 7px; margin-top: 6px; opacity: 0; transition: opacity 0.3s; }
    .delta-badge.up   { color: #16a34a; background: #dcfce7; }
    .delta-badge.down { color: #dc2626; background: #fee2e2; }
    .delta-badge.visible { opacity: 1; }
  </style>
</head>
<body>
  <h1>YUHZ [Orange Record] CAFE&amp;CALL EVENT</h1>
  <p class="subtitle">my1pick #429 · Polls every 15s · Sold = 9,999 − current stock</p>

  <div class="warning">
    <span>⚠</span>
    <span>Sold counts assume every option started at 9,999 stock. If the shop restocks or the initial stock differs, counts will be off.</span>
  </div>

  <div class="status-bar">
    <div class="dot" id="dot"></div>
    <span id="status-text">Connecting...</span>
    <span class="next-refresh" id="next-refresh"></span>
  </div>

  <div class="section-label">Events</div>
  <div class="grid" id="grid-events"></div>

  <div class="section-label">1:1 Video Call — By Member</div>
  <div class="grid" id="grid-members"></div>

  <script>
    const PRODUCT_ID = '429';
    const MAX_STOCK = 9999;
    const INTERVAL = 15000;
    // my1pick option id → display name; section: which grid the card goes in
    const OPTIONS = [
      { id: 757, name: 'SPECIAL CAFE', section: 'events' },
      { id: 758, name: 'GROUP CALL',   section: 'events' },
      { id: 759, name: 'BOHYEON',  section: 'members' },
      { id: 760, name: 'HYO',      section: 'members' },
      { id: 761, name: 'HARUTO',   section: 'members' },
      { id: 762, name: 'JUNSEONG', section: 'members' },
      { id: 763, name: 'JAEIL',    section: 'members' },
      { id: 764, name: 'KAI',      section: 'members' },
      { id: 765, name: 'YEONTAE',  section: 'members' },
      { id: 766, name: 'SECHAN',   section: 'members' }
    ];

    let prevSales = {}, countdownTimer;
    function fmt(n) { return n.toLocaleString(); }
    function now() { return new Date().toLocaleTimeString('en-US', { hour12: false }); }

    function buildGrid() {
      OPTIONS.forEach(opt => {
        const card = document.createElement('a');
        card.className = 'card';
        card.id = 'card-' + opt.id;
        card.href = '/option/' + encodeURIComponent(opt.name);
        card.innerHTML = `
          <div class="member-name">${opt.name}<span class="arrow">→</span></div>
          <div class="sales-row">
            <div class="sales-count" id="sales-${opt.id}">—</div>
            <div class="sales-label">sold</div>
          </div>
          <div class="stock-sub" id="stock-${opt.id}"></div>
          <div class="delta-badge" id="badge-${opt.id}"></div>`;
        document.getElementById('grid-' + opt.section).appendChild(card);
      });
    }

    function update(data) {
      OPTIONS.forEach(opt => {
        const apiOpt = (data.options || []).find(o => o.id === opt.id);
        if (!apiOpt) return;
        const sales = MAX_STOCK - apiOpt.stock;
        document.getElementById('sales-' + opt.id).textContent = fmt(sales);
        document.getElementById('stock-' + opt.id).textContent = fmt(apiOpt.stock) + ' left of ' + fmt(MAX_STOCK);
        const prev = prevSales[opt.id];
        if (prev !== undefined && sales !== prev) {
          const delta = sales - prev;
          const badge = document.getElementById('badge-' + opt.id);
          const card  = document.getElementById('card-'  + opt.id);
          badge.textContent = (delta > 0 ? '+' : '') + fmt(delta);
          badge.className = 'delta-badge visible ' + (delta > 0 ? 'up' : 'down');
          card.classList.add('changed');
          setTimeout(() => { badge.classList.remove('visible'); card.classList.remove('changed'); }, 5000);
        }
        prevSales[opt.id] = sales;
      });
    }

    function setStatus(ok, text) {
      document.getElementById('dot').className = 'dot ' + (ok ? 'active' : 'error');
      document.getElementById('status-text').textContent = text;
    }

    function startCountdown() {
      clearInterval(countdownTimer);
      let c = INTERVAL / 1000;
      const el = document.getElementById('next-refresh');
      el.textContent = 'Next refresh in ' + c + 's';
      countdownTimer = setInterval(() => {
        c--;
        el.textContent = c > 0 ? 'Next refresh in ' + c + 's' : 'Refreshing...';
        if (c <= 0) clearInterval(countdownTimer);
      }, 1000);
    }

    async function fetchStock() {
      try {
        const data = await fetch('/api/stockPick?productId=' + PRODUCT_ID).then(r => r.json());
        if (data.error || !data.id) throw new Error(data.error || 'product not found');
        update(data);
        setStatus(true, 'Live · ' + now());
      } catch (e) { setStatus(false, 'Error: ' + e.message); }
      startCountdown();
    }

    buildGrid();
    fetchStock();
    setInterval(fetchStock, INTERVAL);
  </script>
</body>
</html>
